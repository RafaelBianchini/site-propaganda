<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarisGo - Design Final</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="background-gradient"></div>

        <header class="header">
            <div class="contact-info">
                +55 47 4002-8922<br>
                solarisgo@gmail.com
            </div>
            <div class="cta-top">
                COMPRE AGORA!!!
            </div>
        </header>

        <div class="feature-icon-circle">
            <img src="image 1.png" alt="Icone" class="icon-inside-color-circle">
        </div>

        <div class="product-visual-wrapper">
            <div class="circle-divider-container">
                <div class="small-gradient-circle"></div>
                <img src="carregador_jsaux.png" alt="Carregador SolarisGo JSAUX" class="product-over-circle">
            </div>
        </div>

        <section class="middle-content">
            <div class="feature-container">
                <p class="feature-text">Energia limpa. Mobilidade total.</p>
            </div>
        </section>

        <section class="bottom-content">
            <div class="text-offer-container">
                <h1 class="main-title">CARREGADOR SOLAR</h1>
                <h1 class="secondary-title">PORTÁTIL</h1>
                <p class="brand-subtext">SolarisGo</p>
                
                <div class="price-section">
                    <h2 class="price-call">POR APENAS</h2>
                    <h2 class="price-value">R$300!!!</h2>
                </div>
            </div>
        </section>

        <div class="black-circle-bottom">
            <img src="carregador_vxcase.png" alt="Carregador VX Case" class="product-vxcase-over-circle">
        </div>

        <p class="footer-slogan">Conecte-se ao mundo, carregue com o sol.</p>

    </div>

</body>
</html>
